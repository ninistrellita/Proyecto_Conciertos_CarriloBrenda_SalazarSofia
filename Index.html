<!DOCTYPE html>
<html lang="es">
<head>

    <link rel="stylesheet" href="CSS/Style.css">
</head>
<body>

            <h1 class="logo-texto">Conciertos Conectados</h1>
        </div>
            <ul class="menu">
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Categorias</a></li>

    <main>
        <section class="eventos-principales">
            <div class="slider-wrapper">
                <img src="img/img_eventos/evento 1.jpg" alt="Evento Principal" class="evento-slide">
