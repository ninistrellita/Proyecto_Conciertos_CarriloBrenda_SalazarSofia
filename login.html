<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Conciertos Conectados Admin</title>
    <link rel="stylesheet" href="CSS/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-page">
        <form id="loginForm" class="login-card">
            <div class="profile-avatar" style="margin: 0 auto 1rem;">
                <i class="fa-solid fa-user-gear"></i>
            </div>
            <h2>Conciertos Conectados</h2>
            <p style="text-align:center; color:var(--text-muted); margin-top:-0.6rem;">Panel de Administración</p>

            <div class="form-group">
                <label for="correo">Correo</label>
                <input type="email" id="correo" required placeholder="admin@mail.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••">
            </div>

            <div id="errorMessage" class="login-error" style="display:none;"></div>

            <button type="submit" class="btn-action btn-full">Iniciar Sesión</button>
        </form>
    </div>

    <script src="JS/login.js"></script>
</body>
</html>
